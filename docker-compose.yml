services:
  workoutt:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /data/workoutt.db
      # SEED: "true"   # uncomment to seed sample exercises on first start
    volumes:
      # The sqlite DB must live on a named volume — recreating the container
      # would otherwise destroy all synced data (see plan.md).
      - workoutt-data:/data
    restart: unless-stopped

volumes:
  workoutt-data:
